<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio – Cantina Colégio Curso Raiz</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --laranja:  #F47920;
    --laranja2: #e06510;
    --verde:    #5BAD6F;
    --ciano:    #3BBFCE;
    --fundo:    #FFF8F0;
    --card-bg:  #FFFFFF;
    --texto:    #2C1800;
    --texto2:   #7a5030;
    --sombra:   0 4px 24px rgba(244,121,32,.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--fundo);
    color: var(--texto);
    min-height: 100vh;
  }

  /* ── TOPO ── */
  .topo {
    background: var(--laranja);
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,.18);
    position: sticky; top: 0; z-index: 10;
  }
  .topo img {
    height: 64px;
    width: auto;
  }
  .topo-texto h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    letter-spacing: .5px;
  }
  .topo-texto p {
    color: #FFE0B2;
    font-size: .88rem;
    font-weight: 600;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, #F47920 0%, #e8630d 50%, #FF9A44 100%);
    padding: 32px 24px 28px;
    text-align: center;
    color: #fff;
  }
  .hero h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .hero p {
    font-size: .92rem;
    opacity: .9;
    max-width: 480px;
    margin: 0 auto;
  }
  .hero-badge {
    display: inline-block;
    background: rgba(255,255,255,.2);
    border: 1.5px solid rgba(255,255,255,.4);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: .8rem;
    font-weight: 700;
    margin-top: 12px;
  }

  /* ── FILTROS ── */
  .filtros-wrap {
    background: #fff;
    border-bottom: 2px solid #FFE0C0;
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }
  .btn-cat {
    border: 2px solid #FFD4A0;
    background: #fff;
    border-radius: 20px;
    padding: 6px 18px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: .85rem;
    cursor: pointer;
    color: var(--texto2);
    transition: all .2s;
  }
  .btn-cat:hover  { border-color: var(--laranja); color: var(--laranja); }
  .btn-cat.ativo  { background: var(--laranja); border-color: var(--laranja); color: #fff; }

  /* ── GRADE ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

  .secao-titulo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 28px 0 16px;
  }
  .secao-titulo span {
    font-family: 'Baloo 2', cursive;
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--laranja);
  }
  .secao-linha {
    flex: 1;
    height: 2px;
    background: linear-gradient(to right, #FFD4A0, transparent);
    border-radius: 2px;
  }

  .grade {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 18px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 18px;
    box-shadow: var(--sombra);
    overflow: hidden;
    border: 1.5px solid #FFE5C8;
    transition: transform .22s, box-shadow .22s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 32px rgba(244,121,32,.22);
  }

  .card-foto {
    height: 130px;
    background: linear-gradient(135deg, #FFF0E0, #FFE0C0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.2rem;
    position: relative;
    overflow: hidden;
  }
  .card-foto img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .card-body {
    padding: 14px 14px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-cat {
    font-size: .68rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .8px;
    padding: 3px 10px;
    border-radius: 10px;
    display: inline-block;
    align-self: flex-start;
  }
  .card-nome {
    font-weight: 800;
    font-size: 1rem;
    color: var(--texto);
    line-height: 1.25;
  }
  .card-preco {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--laranja);
    margin-top: auto;
  }

  /* ── VAZIO ── */
  .vazio {
    text-align: center;
    padding: 60px 20px;
    color: #ccc;
  }
  .vazio span { font-size: 3rem; display: block; margin-bottom: 12px; }
  .vazio p { font-size: .95rem; }

  /* ── RODAPÉ ── */
  .rodape {
    background: var(--laranja);
    color: rgba(255,255,255,.85);
    text-align: center;
    padding: 16px;
    font-size: .82rem;
    font-weight: 600;
  }

  /* ── RELOGIO ── */
  .relogio {
    background: rgba(255,255,255,.18);
    border-radius: 12px;
    padding: 4px 12px;
    font-size: .8rem;
    font-weight: 700;
    color: #fff;
    margin-left: auto;
    position: absolute;
    top: 14px; right: 20px;
  }

  /* ── CORES DAS CATEGORIAS ── */
  .cat-Salgado  { background: #FDE8CC; color: #B35A00; }
  .cat-Biscoito { background: #F5E6D3; color: #7A4520; }
  .cat-Doce     { background: #FFE0EC; color: #B00040; }
  .cat-Bebida   { background: #D8F4F8; color: #006D7A; }

  .icone-cat-Salgado  { background: linear-gradient(135deg,#F4A460,#E07820); }
  .icone-cat-Biscoito { background: linear-gradient(135deg,#DEB887,#C07040); }
  .icone-cat-Doce     { background: linear-gradient(135deg,#FFB6C1,#E0608A); }
  .icone-cat-Bebida   { background: linear-gradient(135deg,#87CEEB,#3090C0); }

  @media (max-width: 600px) {
    .grade { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .topo-texto h1 { font-size: 1.4rem; }
    .topo img { height: 48px; }
    .relogio { display: none; }
  }
</style>
</head>

<!-- HERO -->
<div class="hero">
  <h2>🍽️ O que tem hoje?</h2>
  <p>Confira os produtos disponíveis na cantina do colégio. Preços atualizados em tempo real!</p>
  <div class="hero-badge" id="hero-badge">Carregando...</div>
</div>

<!-- FILTROS -->
<div class="filtros-wrap">
  <input type="text" id="busca-cardapio" placeholder="🔍 Buscar produto..."
    oninput="renderizar()"
    style="border:2px solid #FFD4A0;border-radius:20px;padding:6px 16px;
           font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;
           color:#2C1800;outline:none;min-width:180px;transition:border-color .2s"
    onfocus="this.style.borderColor='#F47920'" onblur="this.style.borderColor='#FFD4A0'">
  <button class="btn-cat ativo" onclick="filtrar('Todos',this)">🍽 Todos</button>
  <button class="btn-cat" onclick="filtrar('Salgado',this)">🥧 Salgados</button>
  <button class="btn-cat" onclick="filtrar('Biscoito',this)">🍪 Biscoitos</button>
  <button class="btn-cat" onclick="filtrar('Doce',this)">🍬 Doces</button>
  <button class="btn-cat" onclick="filtrar('Bebida',this)">🥤 Bebidas</button>
</div>

<!-- CONTEÚDO -->
<div class="container">
  <div id="conteudo"></div>
</div>

<!-- RODAPÉ -->
<footer class="rodape">
  © Cantina Colégio Curso Raiz — Cardápio atualizado automaticamente
</footer>

<script>
const icones = { Salgado:'🥧', Biscoito:'🍪', Doce:'🍬', Bebida:'🥤' };
const fmt = v => 'R$ ' + v.toFixed(2).replace('.', ',');
let todosProds = [];
let catAtiva = 'Todos';

async function carregar() {
  try {
    const r = await fetch('/api/produtos?categoria=Todos&busca=');
    todosProds = await r.json();
    renderizar();
    atualizarBadge();
  } catch(e) {
    document.getElementById('conteudo').innerHTML =
      '<div class="vazio"><span>😕</span><p>Não foi possível carregar o cardápio. Tente novamente.</p></div>';
  }
}

function filtrar(cat, btn) {
  catAtiva = cat;
  document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  renderizar();
}

function renderizar() {
  const busca = (document.getElementById('busca-cardapio')?.value || '').toLowerCase().trim();
  let prods = catAtiva === 'Todos' ? todosProds : todosProds.filter(p => p.categoria === catAtiva);
  if (busca) prods = prods.filter(p => p.nome.toLowerCase().includes(busca));

  if (!prods.length) {
    document.getElementById('conteudo').innerHTML =
      '<div class="vazio"><span>🔍</span><p>Nenhum produto encontrado' + (busca ? ` para "<b>${busca}</b>"` : ' nesta categoria') + '.</p></div>';
    return;
  }

  // Agrupar por categoria
  const grupos = {};
  prods.forEach(p => {
    if (!grupos[p.categoria]) grupos[p.categoria] = [];
    grupos[p.categoria].push(p);
  });

  const ordem = ['Salgado','Biscoito','Doce','Bebida'];
  let html = '';

  (catAtiva === 'Todos' ? ordem : [catAtiva]).forEach(cat => {
    if (!grupos[cat] || !grupos[cat].length) return;
    html += `
      <div class="secao-titulo">
        <span>${icones[cat] || '🍽'} ${cat}s</span>
        <div class="secao-linha"></div>
      </div>
      <div class="grade">
        ${grupos[cat].map(p => {
          const foto = p.foto_b64
            ? `<img src="data:image/jpeg;base64,${p.foto_b64}" alt="${p.nome}">`
            : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,#FFF0E0,#FFD4A0)">${icones[p.categoria]||'🍽'}</div>`;
          return `
            <div class="card">
              <div class="card-foto">${foto}</div>
              <div class="card-body">
                <span class="card-cat cat-${p.categoria}">${p.categoria}</span>
                <div class="card-nome">${p.nome}</div>
                <div class="card-preco">${fmt(p.preco)}</div>
              </div>
            </div>`;
        }).join('')}
      </div>`;
  });

  document.getElementById('conteudo').innerHTML = html;
}

function atualizarBadge() {
  const qtd = todosProds.length;
  const cats = [...new Set(todosProds.map(p => p.categoria))].length;
  document.getElementById('hero-badge').textContent =
    `${qtd} produto${qtd !== 1 ? 's' : ''} disponível${qtd !== 1 ? 'is' : ''} em ${cats} categori${cats !== 1 ? 'as' : 'a'}`;
}

function tick() {
  const d = new Date();
  document.getElementById('relogio').textContent =
    d.toLocaleDateString('pt-BR') + '  ' + d.toLocaleTimeString('pt-BR');
  setTimeout(tick, 1000);
}

// Recarregar a cada 60 segundos
carregar();
tick();
setInterval(carregar, 60000);
</script>
</body>
</html>
